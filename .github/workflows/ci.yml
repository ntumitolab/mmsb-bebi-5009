name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_NUM: '1'
  LITERATE_PROC: '8'
  JULIA_CI: 'true'
  # JULIA_CPU_TARGET: 'generic;icelake-server,clone_all;znver3,clone_all'
  JULIA_NUM_THREADS: '2'
  OPENBLAS_NUM_THREADS: '1'
  NBCACHE: '.cache'

jobs:
  CI:
    runs-on: self-hosted
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Setup Python
      uses: actions/setup-python@v7
      id: setup-python
      with:
        python-version: 3.x
    - name: Read Julia version
      id: julia-version
      run: python -c 'import tomllib; from pathlib import Path; print("resolved=", tomllib.loads(Path("Manifest.toml").read_text())["julia_version"], sep="")' >> "$GITHUB_OUTPUT"
    - name: Get environment hashes
      id: hash
      run: |
        echo "jl=${{ runner.os }}-${{ runner.arch }}-julia-${{ steps.julia-version.outputs.resolved }}" >> "$GITHUB_OUTPUT"
        echo "env=${{ env.CACHE_NUM }}-${{ hashFiles('Project.toml', 'Manifest.toml', 'Startup/**') }}" >> "$GITHUB_OUTPUT"
        echo "nb=${{ hashFiles('docs/**/*.jl', 'docs/**/*.ipynb') }}" >> "$GITHUB_OUTPUT"
    - name: Cache executed notebooks
      uses: actions/cache@v6
      id: cache-nb
      with:
        path: |
          ${{ env.NBCACHE }}/**/*.ipynb
          ${{ env.NBCACHE }}/**/*.sha
        key: notebook-${{ steps.hash.outputs.env }}-${{ steps.hash.outputs.nb }}
        restore-keys: |
          notebook-${{ steps.hash.outputs.env }}-
    - name: Setup Julia
      uses: julia-actions/setup-julia@v3
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' }}
      with:
        version: ${{ steps.julia-version.outputs.resolved }}
    - name: Restore Julia package cache
      uses: actions/cache/restore@v6
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' && runner.environment == 'github-hosted' }}
      id: cache-julia
      with:
        path: ~/.julia
        key: ${{ steps.hash.outputs.jl }}-${{ steps.hash.outputs.env }}
        restore-keys: |
          ${{ steps.hash.outputs.jl }}-
    - name: Install Julia packages
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' && (runner.environment == 'self-hosted' || steps.cache-julia.outputs.cache-hit != 'true') }}
      shell: julia --color=yes --project=@. {0}
      run: using Pkg; Pkg.instantiate()
    - name: Save Julia package cache
      uses: actions/cache/save@v6
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' && runner.environment == 'github-hosted' && steps.cache-julia.outputs.cache-hit != 'true' }}
      with:
        path: ~/.julia
        key: ${{ steps.cache-julia.outputs.cache-primary-key }}
    - name: Run notebooks
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' }}
      run: julia --project=@. --color=yes -p ${{ env.LITERATE_PROC }} .github/ci.jl
    - name: Copy back built notebooks
      run: cp --verbose -rf ${{ env.NBCACHE }}/docs/* docs/
    - name: Setup NodeJS
      uses: actions/setup-node@v7
      with:
        node-version: 'lts/*'
    - name: Build website
      env:
        BASE_URL: /${{ github.event.repository.name }}
      working-directory: docs
      run: |
        npm install -g "jupyter-book"
        jupyter-book build --html
    - name: Upload pages artifact
      if: ${{ github.ref == 'refs/heads/main' }}
      uses: actions/upload-pages-artifact@v5
      with:
        path: 'docs/_build/html'

  # Deployment job
  deploy:
    name: Deploy to GitHub pages and Notebook branch
    needs: CI
    if: ${{ github.ref == 'refs/heads/main' }}
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write    # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-slim
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
