name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LITERATE_PROC: '2'
  JULIA_CI: 'true'
  JULIA_NUM_THREADS: '2'
  OPENBLAS_NUM_THREADS: '1'
  NBCACHE: '.cache'

jobs:
  CI:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Read Julia version
      uses: julia-actions/julia-version@main
      id: julia-version
      with:
        versions: manifest
    - name: Get hashes
      id: hash
      run: |
        echo "value=${{ hashFiles('Project.toml', 'Manifest.toml', 'Startup/**') }}" >> "$GITHUB_OUTPUT"
        echo "nb=${{ hashFiles('docs/**/*.jl', 'docs/**/*.ipynb') }}" >> "$GITHUB_OUTPUT"
    - name: Cache executed notebooks
      uses: actions/cache@v5
      id: cache-nb
      with:
        path: |
          ${{ env.NBCACHE }}/**/*.ipynb
          ${{ env.NBCACHE }}/**/*.sha
        key: notebook-${{ steps.hash.outputs.value }}-${{ steps.hash.outputs.nb }}
        restore-keys: |
          notebook-${{ steps.hash.outputs.value }}-
    - name: Setup Julia
      uses: julia-actions/setup-julia@v2
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' }}
      with:
        version: ${{ steps.julia-version.outputs.resolved }}
    - name: Cache Julia packages
      uses: julia-actions/cache@v3
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' && runner.environment == 'github-hosted' }}
      id: cache-julia
    - name: Install Julia packages
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' && (runner.environment == 'self-hosted' || steps.cache-julia.outputs.cache-hit != 'true') }}
      run: julia --color=yes .github/setup.jl
    - name: Run notebooks
      if: ${{ steps.cache-nb.outputs.cache-hit != 'true' }}
      env:
        JULIA_CONDAPKG_OFFLINE: 'true'
      run: |
        julia --project=@. --color=yes -p ${{ env.LITERATE_PROC }} .github/ci.jl
    - name: Copy back built notebooks
      run: cp --verbose -rf ${{ env.NBCACHE }}/docs/* docs/
    - name: Setup NodeJS
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
    - name: Build website
      env:
        BASE_URL: /${{ github.event.repository.name }}
      working-directory: docs
      run: |
        npm install -g "jupyter-book"
        jupyter-book build --html
    - name: Upload pages artifact
      if: ${{ github.ref == 'refs/heads/main' }}
      uses: actions/upload-pages-artifact@v5
      with:
        path: 'docs/_build/html'

  # Deployment job
  deploy:
    name: Deploy to GitHub pages and Notebook branch
    needs: CI
    if: ${{ github.ref == 'refs/heads/main' }}
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write    # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-slim
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
